<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="100%" style="stop-color:#1a1a1a"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Accent line -->
  <rect x="80" y="200" width="80" height="4" rx="2" fill="#ef4444"/>

  <!-- Name -->
  <text x="80" y="270" font-family="'Poiret One', 'Helvetica Neue', sans-serif" font-size="64" font-weight="400" fill="#ffffff" letter-spacing="2">
    Derrell Willis
  </text>

  <!-- Title -->
  <text x="80" y="330" font-family="'Raleway', 'Helvetica Neue', sans-serif" font-size="28" font-weight="300" fill="#a3a3a3" letter-spacing="1">
    Product Manager &amp; Developer Relations
  </text>

  <!-- Subtitle -->
  <text x="80" y="380" font-family="'Raleway', 'Helvetica Neue', sans-serif" font-size="20" font-weight="300" fill="#737373" letter-spacing="0.5">
    Community Builder · Technical Storyteller · Developer Advocate
  </text>

  <!-- URL -->
  <text x="80" y="540" font-family="'Raleway', 'Helvetica Neue', sans-serif" font-size="18" font-weight="400" fill="#ef4444" letter-spacing="1">
    derrellwillis.com
  </text>

  <!-- Bottom accent line -->
  <rect x="0" y="620" width="1200" height="10" fill="#ef4444"/>
</svg>
